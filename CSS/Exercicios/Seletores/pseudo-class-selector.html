<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo-class-selector</title>
  <style>
    li:nth-child(3) {
      color: red;
    }
  </style>
</head>
<body>
  <main>
    <ul>
      <p>wiskas saquetas</p>
      <p>bla bla bla</p>
      <li>item1</li>
      <li>item2</li>
      <li>item3</li>
      <li>item4</li>
      <li>item5</li>
      <li>item6</li>
    </ul>
  </main>
</body>
</html>
